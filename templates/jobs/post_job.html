{% extends 'base.html' %}
{% load static %}

{% block title %}Post a Job | Django Job Portal{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto my-10">
    
    <div class="mb-8">
        <h1 class="text-3xl font-extrabold text-gray-900">Post a New Job</h1>
        <p class="text-gray-500 mt-2">Fill out the details below to publish a job opening to the portal.</p>
    </div>

    <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
        <form method="POST" action="{% url 'post_job' %}" class="space-y-6">
            {% csrf_token %}

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="title" class="block text-sm font-medium text-gray-700 mb-1">Job Title</label>
                    <input type="text" id="title" name="title" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-gray-800"
                           placeholder="e.g. Senior Django Developer">
                </div>
                <div>
                    <label for="company" class="block text-sm font-medium text-gray-700 mb-1">Company Name</label>
                    <input type="text" id="company" name="company" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-gray-800"
                           placeholder="e.g. TechNova Solutions">
                </div>
            </div>

            <div>
                <label for="description" class="block text-sm font-medium text-gray-700 mb-1">Job Description</label>
                <textarea id="description" name="description" rows="5" required
                          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-gray-800"
                          placeholder="Describe the responsibilities, requirements, and benefits..."></textarea>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="job_type" class="block text-sm font-medium text-gray-700 mb-1">Job Type</label>
                    <select id="job_type" name="job_type" required
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-gray-800 bg-white">
                        <option value="" disabled selected>Select Job Type</option>
                        <option value="full_time">Full Time</option>
                        <option value="part_time">Part Time</option>
                        <option value="remote">Remote</option>
                        <option value="contract">Contract</option>
                        <option value="internship">Internship</option>
                    </select>
                </div>
                <div>
                    <label for="location" class="block text-sm font-medium text-gray-700 mb-1">Location</label>
                    <input type="text" id="location" name="location" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-gray-800"
                           placeholder="e.g. Dhaka, Bangladesh">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label for="openings" class="block text-sm font-medium text-gray-700 mb-1">No. of Openings</label>
                    <input type="number" id="openings" name="openings" min="1" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-gray-800"
                           placeholder="e.g. 3">
                </div>
                <div>
                    <label for="salary" class="block text-sm font-medium text-gray-700 mb-1">Salary (Monthly/Yearly)</label>
                    <input type="number" id="salary" name="salary" min="0" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-gray-800"
                           placeholder="e.g. 50000">
                </div>
                <div>
                    <label for="deadline" class="block text-sm font-medium text-gray-700 mb-1">Application Deadline</label>
                    <input type="date" id="deadline" name="deadline" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-gray-800">
                </div>
            </div>

            <div class="flex items-center justify-end gap-4 pt-4 border-t border-gray-100">
                <a href="{% url 'profile' user.username %}" class="px-6 py-2.5 text-gray-600 font-medium hover:bg-gray-100 rounded-lg transition-colors">
                    Cancel
                </a>
                <button type="submit" class="bg-blue-600 text-white font-semibold px-8 py-2.5 rounded-lg hover:bg-blue-700 transition-colors shadow-sm">
                    Publish Job
                </button>
            </div>
            
        </form>
    </div>
</div>
{% endblock %}
