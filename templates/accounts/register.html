{% extends 'base.html' %}
{% load static %}

{% block title %}Register | Django Job Portal{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto bg-white p-8 rounded-2xl shadow-sm border border-gray-100 my-8">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-extrabold text-gray-900 mb-2">Create an Account</h1>
        <p class="text-gray-500">Join our community to find or post jobs.</p>
    </div>

    <form method="POST" action="{% url 'register' %}" enctype="multipart/form-data" class="space-y-5">
        {% csrf_token %}

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">I am a:</label>
            <div class="grid grid-cols-2 gap-4">
                <label class="cursor-pointer">
                    <input type="radio" name="user_type" value="jobseeker" class="peer sr-only" checked>
                    <div class="text-center px-4 py-3 border border-gray-200 rounded-lg peer-checked:border-blue-600 peer-checked:bg-blue-50 peer-checked:text-blue-700 hover:bg-gray-50 transition-colors font-medium text-gray-600">
                        Jobseeker
                    </div>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="user_type" value="recruiter" class="peer sr-only">
                    <div class="text-center px-4 py-3 border border-gray-200 rounded-lg peer-checked:border-blue-600 peer-checked:bg-blue-50 peer-checked:text-blue-700 hover:bg-gray-50 transition-colors font-medium text-gray-600">
                        Recruiter
                    </div>
                </label>
            </div>
        </div>

        <div>
            <label for="profile_pic" class="block text-sm font-medium text-gray-700 mb-1">Profile Picture</label>
            <input type="file" id="profile_pic" name="profile_pic" accept="image/*"
                   class="block w-full text-sm text-gray-500
                          file:mr-4 file:py-2 file:px-4
                          file:rounded-full file:border-0
                          file:text-sm file:font-semibold
                          file:bg-blue-50 file:text-blue-700
                          hover:file:bg-blue-100
                          cursor-pointer transition-colors">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" id="username" name="username" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-shadow text-gray-800 placeholder-gray-400"
                       placeholder="johndoe">
            </div>
            
            <div>
                <label for="display_name" class="block text-sm font-medium text-gray-700 mb-1">Display Name</label>
                <input type="text" id="display_name" name="display_name" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-shadow text-gray-800 placeholder-gray-400"
                       placeholder="John Doe">
            </div>
        </div>

        <div>
            <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
            <input type="email" id="email" name="email" required
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-shadow text-gray-800 placeholder-gray-400"
                   placeholder="john@example.com">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" name="password" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-shadow text-gray-800"
                       placeholder="••••••••">
            </div>
            
            <div>
                <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-shadow text-gray-800"
                       placeholder="••••••••">
            </div>
        </div>

        <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-3 rounded-lg hover:bg-blue-700 transition-colors shadow-sm mt-4">
            Create Account
        </button>

        <p class="text-center text-sm text-gray-600 mt-6">
            Already have an account? 
            <a href="{% url 'login' %}" class="font-medium text-blue-600 hover:underline">Log in here</a>
        </p>
    </form>
</div>
{% endblock %}
