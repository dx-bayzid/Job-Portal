{% extends 'base.html' %}
{% load static %}

{% block title %}Login | Django Job Portal{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-sm border border-gray-100 my-12 md:my-20">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-extrabold text-gray-900 mb-2">Welcome Back</h1>
        <p class="text-gray-500">Log in to your account to continue.</p>
    </div>

    <form method="POST" action="{% url 'login' %}" class="space-y-6">
        {% csrf_token %}

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Username or email</label>
            <input type="text" name="username_or_email" required
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-shadow text-gray-800 placeholder-gray-400"
                   placeholder="Enter your username / Email">
        </div>

        <div>
            <div class="flex justify-between items-center mb-1">
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <a href="#" class="text-sm font-medium text-blue-600 hover:underline">Forgot password?</a>
            </div>
            <input type="password" name="password" required
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-shadow text-gray-800"
                   placeholder="••••••••">
        </div>

        <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-3 rounded-lg hover:bg-blue-700 transition-colors shadow-sm">
            Log In
        </button>

        <p class="text-center text-sm text-gray-600 mt-6">
            Don't have an account? 
            <a href="{% url 'register' %}" class="font-medium text-blue-600 hover:underline">Sign up here</a>
        </p>
    </form>
</div>
{% endblock %}
